# cargo-deny configuration — enforced in CI.
# See https://embarkstudios.github.io/cargo-deny/

[graph]
# Evaluate the FULL feature graph (incl. the `fastembed`/ONNX stack, off by default
# in `core`) so CI's `cargo deny check` covers the same surface as the
# `--all-features` build — otherwise the ML stack's licenses/advisories go
# unchecked in CI. Mirrors `scripts/check.sh`'s `cargo deny --all-features`.
all-features = true
# Check every release target, not just CI's host, so platform-only deps
# (e.g. interprocess's Windows named-pipe crates) are license/advisory-checked too.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
    "x86_64-pc-windows-msvc",
]

[advisories]
version = 2
yanked = "deny"
# Only fail on unmaintained crates we depend on *directly*. Transitive unmaintained
# crates in the ONNX/ML stack (e.g. `paste`, RUSTSEC-2024-0436) are out of our control.
unmaintained = "workspace"

[licenses]
version = 2
# Permissive licenses compatible with memeora's MIT OR Apache-2.0 dual license.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    # CA-certificate bundle (webpki-roots) pulled by hf-hub's model downloader
    # under the `fastembed` feature. Permissive data license.
    "CDLA-Permissive-2.0",
    # libfuzzer-sys, via rav1e -> ravif -> image -> fastembed. OSI-approved,
    # FSF Free/Libre, permissive (MIT/BSD-like).
    "NCSA",
    # doctest-file / recvmsg (interprocess deps). Zero-clause BSD — public-domain
    # equivalent, more permissive than MIT (no attribution required).
    "0BSD",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
