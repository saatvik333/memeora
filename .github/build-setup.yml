- name: Set up Bun
  uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
  with:
    bun-version: latest
- name: Build dashboard assets
  shell: bash
  run: |
    cd dashboard
    bun install --frozen-lockfile
    bun run build
    ! grep -q "hasn't been built into this binary" dist/index.html
